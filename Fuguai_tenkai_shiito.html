<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>不具合展開シート</title>
<style>
:root {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --surface2: #f8f9fa;
  --border: #dde1e7;
  --accent: #1a3a5c;
  --accent-light: #e8f0fe;
  --danger: #e02424;
  --danger-light: #fde8e8;
  --warn: #d97706;
  --warn-light: #fef3c7;
  --ok: #057a55;
  --ok-light: #def7ec;
  --partial: #7c3aed;
  --partial-light: #ede9fe;
  --text: #111928;
  --text2: #6b7280;
  --text3: #9ca3af;
  --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'BIZ UDPGothic','Meiryo UI','Yu Gothic UI',sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }

/* ヘッダー */
.header { height: 56px; background: var(--accent); display: flex; align-items: center; padding: 0 16px; gap: 10px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
.header-icon { width: 32px; height: 32px; background: rgba(232,160,32,.2); border: 1px solid rgba(232,160,32,.4); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.header-title { color: #fff; font-size: 16px; font-weight: 700; flex: 1; }
.header-user { color: rgba(255,255,255,.85); font-size: 12px; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
.header-user-dot { width: 8px; height: 8px; background: #34d399; border-radius: 50%; flex-shrink: 0; }

.main { max-width: 1100px; margin: 0 auto; padding: 14px 12px; }

/* GAS設定 */
.setup-panel { background: var(--warn-light); border: 1px solid #fcd34d; border-radius: var(--radius); padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.setup-panel.hidden { display: none; }
.setup-label { font-size: 13px; color: var(--warn); font-weight: 600; white-space: nowrap; }
.setup-input { flex: 1; min-width: 260px; border: 1px solid #fcd34d; border-radius: 6px; padding: 8px 12px; font-size: 13px; background: #fff; outline: none; }
.setup-input:focus { border-color: var(--accent); }
.btn-setup { background: var(--warn); color: #fff; border: none; border-radius: 6px; padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }

/* あなたの未確認バナー */
.my-alert { background: var(--danger-light); border: 1.5px solid var(--danger); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
.my-alert.hidden { display: none; }
.my-alert-icon { font-size: 20px; flex-shrink: 0; }
.my-alert-text { flex: 1; }
.my-alert-count { font-size: 22px; font-weight: 800; color: var(--danger); }
.my-alert-label { font-size: 12px; color: var(--danger); font-weight: 600; }
.my-alert-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }

/* 統計 */
.stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 14px; }
@media (min-width: 600px) { .stats-row { grid-template-columns: repeat(4, 1fr); } }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
.stat-label { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
.stat-value { font-size: 22px; font-weight: 700; }
.stat-card.total .stat-value { color: var(--accent); }
.stat-card.my-unconfirmed .stat-value { color: var(--danger); }
.stat-card.confirmed .stat-value { color: var(--ok); }
.stat-card.today .stat-value { color: var(--warn); }

/* ツールバー */
.toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.search-wrap { display: flex; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0 10px; gap: 6px; flex: 1; min-width: 180px; }
.search-wrap input { border: none; outline: none; font-size: 14px; padding: 9px 0; width: 100%; background: transparent; }
.filter-select { border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 10px; font-size: 13px; background: var(--surface); cursor: pointer; outline: none; color: var(--text); }
.btn { border: none; border-radius: var(--radius); padding: 9px 14px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-outline { background: var(--surface); color: var(--text2); border: 1px solid var(--border); }

/* テーブルラッパー（PC） */
.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.table-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.table-title { font-weight: 700; font-size: 14px; }
.table-count { font-size: 12px; color: var(--text2); }

/* PCテーブル */
.pc-table { display: none; }
@media (min-width: 700px) { .pc-table { display: block; } .card-list { display: none; } }
table { width: 100%; border-collapse: collapse; }
thead tr { background: var(--surface2); border-bottom: 1px solid var(--border); }
th { padding: 9px 12px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text2); white-space: nowrap; }
tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; cursor: pointer; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--accent-light); }
td { padding: 11px 12px; font-size: 13px; vertical-align: middle; }
.td-date { white-space: nowrap; color: var(--text2); font-size: 11px; }
.td-name { font-weight: 600; }
.td-count { font-weight: 700; color: var(--danger); text-align: center; }

/* スマホカードリスト */
.card-list { display: block; }
@media (min-width: 700px) { .card-list { display: none; } }
.defect-card { padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
.defect-card:last-child { border-bottom: none; }
.defect-card:active { background: var(--accent-light); }
.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
.card-part { font-size: 14px; font-weight: 700; flex: 1; line-height: 1.4; }
.card-count { font-size: 18px; font-weight: 800; color: var(--danger); white-space: nowrap; }
.card-mid { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
.card-worker { font-size: 12px; color: var(--text2); }
.card-customer { font-size: 12px; color: var(--text2); }
.card-defect { font-size: 13px; font-weight: 600; }
.card-bottom { display: flex; align-items: center; justify-content: space-between; }
.card-date { font-size: 11px; color: var(--text3); }

/* バッジ */
.badge { display: inline-flex; align-items: center; gap: 3px; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 700; white-space: nowrap; }
.badge-none { background: var(--danger-light); color: var(--danger); }
.badge-partial { background: var(--partial-light); color: var(--partial); }
.badge-all { background: var(--ok-light); color: var(--ok); }
.badge-me { background: var(--accent-light); color: var(--accent); border: 1px solid #c3d4f0; }

/* モーダル */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: center; justify-content: center; padding: 12px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: 12px; width: 100%; max-width: 680px; max-height: 92vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.25); }
.modal-header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--surface); z-index: 1; }
.modal-title { font-size: 16px; font-weight: 700; }
.modal-close { background: none; border: none; font-size: 20px; color: var(--text2); cursor: pointer; padding: 4px 8px; border-radius: 6px; }
.modal-close:hover { background: var(--surface2); }
.modal-body { padding: 18px 20px; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
@media (max-width: 480px) { .detail-grid { grid-template-columns: 1fr; } }
.detail-label { font-size: 10px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }
.detail-value { font-size: 14px; font-weight: 500; }
.detail-value.large { font-size: 20px; font-weight: 800; color: var(--danger); }
.section-title { font-size: 12px; font-weight: 700; color: var(--text2); border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-bottom: 12px; margin-top: 18px; }
.photo-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.photo-placeholder { width: 100%; padding: 20px; border-radius: 8px; border: 2px dashed var(--border); display: flex; align-items: center; justify-content: center; color: var(--text3); font-size: 13px; }

/* 自分の確認状態バナー（モーダル内） */
.my-status-banner { border-radius: var(--radius); padding: 10px 14px; margin-bottom: 12px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.my-status-banner.confirmed { background: var(--ok-light); color: var(--ok); }
.my-status-banner.unconfirmed { background: var(--danger-light); color: var(--danger); }

.confirm-log { background: var(--surface2); border-radius: var(--radius); padding: 12px; margin-bottom: 14px; }
.confirm-log-empty { text-align: center; color: var(--text3); font-size: 12px; padding: 6px; }
.log-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); }
.log-item:last-child { border-bottom: none; }
.log-avatar { width: 26px; height: 26px; background: var(--accent); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.log-avatar.me { background: var(--ok); }
.log-name { font-weight: 600; font-size: 13px; flex: 1; }
.log-time { font-size: 11px; color: var(--text3); }
.confirm-area { background: var(--accent-light); border-radius: var(--radius); padding: 14px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.confirm-note { font-size: 13px; color: var(--accent); flex: 1; }
.btn-confirm { background: var(--accent); color: #fff; border: none; border-radius: var(--radius); padding: 10px 18px; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.btn-confirm:hover { opacity: .9; }
.btn-confirm:disabled { background: var(--ok); cursor: default; }

/* ユーザーモーダル */
.user-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 300; align-items: center; justify-content: center; padding: 16px; }
.user-modal-overlay.open { display: flex; }
.user-modal { background: var(--surface); border-radius: 12px; width: 100%; max-width: 360px; padding: 22px; box-shadow: 0 20px 60px rgba(0,0,0,.25); }
.user-modal-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
.user-select { width: 100%; border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; font-size: 14px; margin-bottom: 12px; outline: none; background: var(--surface); }
.user-btn-row { display: flex; gap: 8px; justify-content: flex-end; }
.btn-cancel { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }

/* トースト */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px); background: #111928; color: #fff; padding: 11px 22px; border-radius: 999px; font-size: 14px; font-weight: 600; z-index: 999; transition: transform .3s; white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.ok { background: var(--ok); }
.toast.err { background: var(--danger); }

.loading { display: flex; align-items: center; justify-content: center; padding: 50px; color: var(--text2); flex-direction: column; gap: 10px; }
.spinner { width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 50px; color: var(--text3); }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">⚠️</div>
  <div class="header-title">不具合展開シート</div>
  <div class="header-user">
    <div class="header-user-dot"></div>
    <span id="current-user-name">未ログイン</span>
  </div>
</div>

<div class="main">

  <div class="setup-panel" id="setup-panel">
    <div class="setup-label">⚙️ GAS URL 未設定</div>
    <input class="setup-input" id="gas-url-input" type="text" placeholder="https://script.google.com/macros/s/...../exec">
    <button class="btn-setup" onclick="saveGasUrl()">接続する</button>
  </div>

  <!-- あなたの未確認バナー -->
  <div class="my-alert hidden" id="my-alert">
    <div class="my-alert-icon">🔔</div>
    <div class="my-alert-text">
      <div><span class="my-alert-count" id="my-alert-count">0</span> <span class="my-alert-label">件、あなたがまだ確認していません</span></div>
      <div class="my-alert-sub">下の一覧から確認してください</div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card total"><div class="stat-label">合計件数</div><div class="stat-value" id="stat-total">—</div></div>
    <div class="stat-card my-unconfirmed"><div class="stat-label">あなたの未確認</div><div class="stat-value" id="stat-my-unconfirmed">—</div></div>
    <div class="stat-card confirmed"><div class="stat-label">全員確認済み</div><div class="stat-value" id="stat-confirmed">—</div></div>
    <div class="stat-card today"><div class="stat-label">本日発生</div><div class="stat-value" id="stat-today">—</div></div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <span style="color:var(--text3)">🔍</span>
      <input type="text" id="search-input" placeholder="品番・担当者・不具合内容で検索..." oninput="applyFilter()">
    </div>
    <select class="filter-select" id="filter-status" onchange="applyFilter()">
      <option value="">すべて</option>
      <option value="my">自分が未確認</option>
      <option value="none">誰も未確認</option>
      <option value="all">全員確認済み</option>
    </select>
    <button class="btn btn-outline" onclick="loadData()">🔄 更新</button>
    <button class="btn btn-primary" onclick="openUserModal()">👤 ユーザー切替</button>
  </div>

  <div class="table-wrap">
    <div class="table-header">
      <div class="table-title">不具合一覧</div>
      <div class="table-count" id="table-count"></div>
    </div>
    <div id="table-area">
      <div class="loading"><div class="spinner"></div>読み込み中...</div>
    </div>
  </div>

</div>

<!-- 詳細モーダル -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">不具合詳細</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- ユーザー選択モーダル -->
<div class="user-modal-overlay" id="user-modal">
  <div class="user-modal">
    <div class="user-modal-title">👤 ユーザーを選択</div>
    <select class="user-select" id="user-select"><option value="">選択してください</option></select>
    <div class="user-btn-row">
      <button class="btn-cancel" onclick="closeUserModal()">キャンセル</button>
      <button class="btn-confirm" onclick="confirmUser()">決定</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY_URL  = 'fuguai_gas_url';
const STORAGE_KEY_USER = 'fuguai_current_user';
let GAS_URL     = localStorage.getItem(STORAGE_KEY_URL) || '';
let currentUser = JSON.parse(localStorage.getItem(STORAGE_KEY_USER) || 'null');
let allRecords  = [];
let confirmLogs = {};

// ポータルSSO
function parseSsoToken(token) {
  try { return JSON.parse(decodeURIComponent(escape(atob(token.split('').reverse().join(''))))); }
  catch(e) { return null; }
}

window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const gasFromPortal = params.get('fuguai_gas_url');
  if (gasFromPortal) { GAS_URL = gasFromPortal; localStorage.setItem(STORAGE_KEY_URL, GAS_URL); }
  const sso = params.get('sso');
  if (sso) {
    const user = parseSsoToken(sso);
    if (user && user.name) { currentUser = { id: user.id, name: user.name }; localStorage.setItem(STORAGE_KEY_USER, JSON.stringify(currentUser)); }
  }
  if (GAS_URL) { document.getElementById('setup-panel').classList.add('hidden'); document.getElementById('gas-url-input').value = GAS_URL; }
  if (currentUser) document.getElementById('current-user-name').textContent = currentUser.name;
  loadData();
});

function saveGasUrl() {
  const v = document.getElementById('gas-url-input').value.trim();
  if (!v) return showToast('URLを入力してください', 'err');
  GAS_URL = v; localStorage.setItem(STORAGE_KEY_URL, v);
  document.getElementById('setup-panel').classList.add('hidden');
  showToast('接続しました', 'ok'); loadData();
}

async function loadData() {
  setTableArea('<div class="loading"><div class="spinner"></div>読み込み中...</div>');
  if (!GAS_URL) { setTableArea('<div class="empty">⚙️ GAS URLを設定してください</div>'); return; }
  try {
    const [r1, r2] = await Promise.all([
      fetch(`${GAS_URL}?action=getDefects`),
      fetch(`${GAS_URL}?action=getConfirmLogs`)
    ]);
    const d1 = await r1.json(), d2 = await r2.json();
    allRecords  = d1.records || [];
    confirmLogs = {};
    (d2.logs || []).forEach(log => {
      if (!confirmLogs[log.recordId]) confirmLogs[log.recordId] = [];
      confirmLogs[log.recordId].push(log);
    });
    updateStats(); applyFilter();
  } catch(e) {
    setTableArea('<div class="empty">❌ データ取得失敗<br><small>GAS URLを確認してください</small></div>');
  }
}

// 自分が確認済みかどうか
function iConfirmed(id) {
  if (!currentUser) return false;
  return (confirmLogs[id] || []).some(l => l.name === currentUser.name);
}

function updateStats() {
  const todayStr = new Date().toISOString().slice(0,10).replace(/-/g,'/');
  let total = allRecords.length, myUnconfirmed = 0, allConfirmed = 0, todayCount = 0;
  allRecords.forEach(r => {
    const logs = confirmLogs[r.id] || [];
    if (!iConfirmed(r.id)) myUnconfirmed++;
    // 「全員確認済み」= 1名以上確認 かつ 自分も確認済み（簡易判定）
    // ※ 全従業員リストがないので「自分含め誰かが確認済み」= 全員確認済みとは言えないが
    //    ここでは自分が確認済みのものをカウント
    if (iConfirmed(r.id)) allConfirmed++;
    if (r.date && r.date.replace(/-/g,'/').startsWith(todayStr)) todayCount++;
  });
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-my-unconfirmed').textContent = myUnconfirmed;
  document.getElementById('stat-confirmed').textContent = allConfirmed;
  document.getElementById('stat-today').textContent = todayCount;

  // 未確認バナー
  const alertEl = document.getElementById('my-alert');
  const alertCount = document.getElementById('my-alert-count');
  if (currentUser && myUnconfirmed > 0) {
    alertEl.classList.remove('hidden');
    alertCount.textContent = myUnconfirmed;
  } else {
    alertEl.classList.add('hidden');
  }
}

function applyFilter() {
  const q      = document.getElementById('search-input').value.toLowerCase();
  const status = document.getElementById('filter-status').value;
  const filtered = allRecords.filter(r => {
    const logs = confirmLogs[r.id] || [];
    const myDone = iConfirmed(r.id);
    if (status === 'my'   && myDone) return false;
    if (status === 'none' && logs.length > 0) return false;
    if (status === 'all'  && !myDone) return false;
    if (q) {
      const hay = [r.part, r.worker, r.defectType, r.customer, r.detail].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  renderTable(filtered);
}

function getStatusBadge(id) {
  const logs  = confirmLogs[id] || [];
  const myDone = iConfirmed(id);
  if (logs.length === 0) return `<span class="badge badge-none">● 未確認</span>`;
  if (myDone) return `<span class="badge badge-all">✔ 自分確認済 ${logs.length}名</span>`;
  return `<span class="badge badge-partial">△ 他${logs.length}名確認済</span>`;
}

function renderTable(records) {
  document.getElementById('table-count').textContent = `${records.length} 件`;
  if (records.length === 0) { setTableArea('<div class="empty">📋 該当する不具合がありません</div>'); return; }

  // PC テーブル
  const pcRows = records.map(r => {
    const hasPhoto = r.photo1 || r.photo2 || r.photo3;
    const myDone = iConfirmed(r.id);
    return `<tr onclick="openDetail('${r.id}')" style="${!myDone ? 'background:#fff9f9' : ''}">
      <td class="td-date">${r.date ? r.date.slice(0,10) : '—'}</td>
      <td class="td-name">${r.worker || '—'}</td>
      <td style="font-family:monospace;font-size:12px">${r.part || '—'}</td>
      <td>${r.customer || '—'}</td>
      <td>${r.defectType || '—'}</td>
      <td class="td-count">${r.defectCount || 0}</td>
      <td>${getStatusBadge(r.id)}</td>
      <td>${hasPhoto ? '📷' : '—'}</td>
    </tr>`;
  }).join('');

  // スマホ カード
  const cards = records.map(r => {
    const myDone = iConfirmed(r.id);
    const hasPhoto = r.photo1 || r.photo2 || r.photo3;
    return `<div class="defect-card" onclick="openDetail('${r.id}')" style="${!myDone ? 'border-left:3px solid var(--danger)' : 'border-left:3px solid var(--ok)'}">
      <div class="card-top">
        <div class="card-part">${r.part || '—'}</div>
        <div class="card-count">${r.defectCount || 0}個</div>
      </div>
      <div class="card-mid">
        <span class="card-worker">👤 ${r.worker || '—'}</span>
        <span class="card-customer">🏭 ${r.customer || '—'}</span>
        ${hasPhoto ? '<span style="font-size:11px">📷</span>' : ''}
      </div>
      <div class="card-defect">${r.defectType || '—'}</div>
      <div class="card-bottom" style="margin-top:6px">
        <div class="card-date">${r.date ? r.date.slice(0,10) : '—'}</div>
        ${getStatusBadge(r.id)}
      </div>
    </div>`;
  }).join('');

  setTableArea(`
    <div class="pc-table">
      <table>
        <thead><tr>
          <th>発生日</th><th>担当者</th><th>品番</th><th>取引先</th>
          <th>不具合内容</th><th>不良数</th><th>確認状況</th><th>写真</th>
        </tr></thead>
        <tbody>${pcRows}</tbody>
      </table>
    </div>
    <div class="card-list">${cards}</div>
  `);
}

function setTableArea(html) { document.getElementById('table-area').innerHTML = html; }

function openDetail(id) {
  const r = allRecords.find(x => x.id === id);
  if (!r) return;
  const logs   = confirmLogs[id] || [];
  const myDone = iConfirmed(r.id);

  const photos = [r.photo1, r.photo2, r.photo3].filter(Boolean);
  const photoHtml = photos.length > 0
    ? `<div class="photo-row">${photos.map(url => {
        if (url.includes('/preview')) return `<div style="width:100%;max-width:320px;height:220px;border-radius:8px;overflow:hidden;border:1px solid var(--border)"><iframe src="${url}" width="100%" height="220" frameborder="0" allowfullscreen style="border:none"></iframe></div>`;
        return `<a href="${url}" target="_blank"><img style="width:100%;max-width:280px;height:200px;object-fit:cover;border-radius:8px;border:1px solid var(--border)" src="${url}" alt="写真" onerror="this.style.display='none'"></a>`;
      }).join('')}</div>`
    : '<div class="photo-placeholder">📷 写真なし</div>';

  const logHtml = logs.length > 0
    ? logs.map(l => {
        const isMe = currentUser && l.name === currentUser.name;
        return `<div class="log-item">
          <div class="log-avatar ${isMe ? 'me' : ''}">${l.name.slice(0,1)}</div>
          <div class="log-name">${l.name}${isMe ? ' <span style="font-size:10px;color:var(--ok)">(あなた)</span>' : ''}</div>
          <div class="log-time">${l.time}</div>
        </div>`;
      }).join('')
    : '<div class="confirm-log-empty">まだ確認者がいません</div>';

  // 自分の確認状態バナー
  const myBanner = currentUser
    ? `<div class="my-status-banner ${myDone ? 'confirmed' : 'unconfirmed'}">
        ${myDone ? '✔ あなたはこの不具合を確認済みです' : '⚠️ あなたはまだこの不具合を確認していません'}
      </div>`
    : '';

  document.getElementById('modal-title').textContent = `不具合詳細 — ${r.part || r.id}`;
  document.getElementById('modal-body').innerHTML = `
    ${myBanner}
    <div class="detail-grid">
      <div><div class="detail-label">報告書ID</div><div class="detail-value" style="font-size:11px;font-family:monospace">${r.id}</div></div>
      <div><div class="detail-label">発生日</div><div class="detail-value">${r.date || '—'}</div></div>
      <div><div class="detail-label">担当者</div><div class="detail-value">${r.worker || '—'}</div></div>
      <div><div class="detail-label">基本取引先</div><div class="detail-value">${r.customer || '—'}</div></div>
      <div><div class="detail-label">品番</div><div class="detail-value">${r.part || '—'}</div></div>
      <div><div class="detail-label">不良数</div><div class="detail-value large">${r.defectCount || 0} 個</div></div>
      <div style="grid-column:1/-1"><div class="detail-label">不具合内容</div><div class="detail-value">${r.defectType || '—'}</div></div>
      <div style="grid-column:1/-1"><div class="detail-label">不具合詳細</div><div class="detail-value">${r.detail || '—'}</div></div>
    </div>
    <div class="section-title">📷 写真</div>
    ${photoHtml}
    <div class="section-title">✅ 確認ログ（${logs.length}名）</div>
    <div class="confirm-log">${logHtml}</div>
    ${currentUser
      ? `<div class="confirm-area">
          <div class="confirm-note">${myDone ? 'あなたは確認済みです' : 'この不具合内容を確認しましたか？'}</div>
          <button class="btn-confirm" id="confirm-btn" onclick="confirmRecord('${id}')" ${myDone ? 'disabled' : ''}>
            ${myDone ? '✔ 確認済み' : '✔ 確認する'}
          </button>
        </div>`
      : `<div class="confirm-area">
          <div class="confirm-note">確認するにはユーザーを選択してください</div>
          <button class="btn-confirm" onclick="closeModal();openUserModal()">👤 ユーザー選択</button>
        </div>`
    }
  `;
  document.getElementById('detail-modal').classList.add('open');
}

function closeModal() { document.getElementById('detail-modal').classList.remove('open'); }

async function confirmRecord(id) {
  if (!currentUser) return openUserModal();
  const btn = document.getElementById('confirm-btn');
  btn.disabled = true; btn.textContent = '送信中...';
  try {
    const params = new URLSearchParams({
      action: 'addConfirmLog',
      recordId: id,
      userId: currentUser.id || '',
      userName: currentUser.name,
      time: new Date().toLocaleString('ja-JP')
    });
    const res  = await fetch(`${GAS_URL}?${params.toString()}`);
    const data = await res.json();
    if (data.ok) {
      if (!confirmLogs[id]) confirmLogs[id] = [];
      confirmLogs[id].push({ name: currentUser.name, time: new Date().toLocaleString('ja-JP') });
      showToast('確認しました！', 'ok');
      closeModal(); updateStats(); applyFilter();
    } else {
      showToast('エラー: ' + (data.error || '送信失敗'), 'err');
      btn.disabled = false; btn.textContent = '✔ 確認する';
    }
  } catch(e) {
    showToast('通信エラー: ' + e.message, 'err');
    btn.disabled = false; btn.textContent = '✔ 確認する';
  }
}

function openUserModal() {
  if (!GAS_URL) { showToast('先にGAS URLを設定してください', 'err'); return; }
  loadEmployees();
  document.getElementById('user-modal').classList.add('open');
}
function closeUserModal() { document.getElementById('user-modal').classList.remove('open'); }

async function loadEmployees() {
  try {
    const res  = await fetch(`${GAS_URL}?action=getEmployees`);
    const data = await res.json();
    const sel  = document.getElementById('user-select');
    sel.innerHTML = '<option value="">選択してください</option>';
    (data.employees || []).forEach(e => {
      const opt = document.createElement('option');
      opt.value = JSON.stringify(e);
      opt.textContent = e.name;
      sel.appendChild(opt);
    });
    if (currentUser) {
      Array.from(sel.options).forEach(o => {
        try { if (JSON.parse(o.value).id === currentUser.id) o.selected = true; } catch {}
      });
    }
  } catch(e) { console.error(e); }
}

function confirmUser() {
  const v = document.getElementById('user-select').value;
  if (!v) return showToast('ユーザーを選択してください', 'err');
  currentUser = JSON.parse(v);
  localStorage.setItem(STORAGE_KEY_USER, JSON.stringify(currentUser));
  document.getElementById('current-user-name').textContent = currentUser.name;
  closeUserModal();
  showToast(`${currentUser.name} に切り替えました`, 'ok');
  updateStats(); applyFilter();
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show' + (type ? ' '+type : '');
  setTimeout(() => t.classList.remove('show'), 2800);
}

document.getElementById('detail-modal').addEventListener('click', e => { if (e.target === document.getElementById('detail-modal')) closeModal(); });
document.getElementById('user-modal').addEventListener('click', e => { if (e.target === document.getElementById('user-modal')) closeUserModal(); });
</script>
</body>
</html>
