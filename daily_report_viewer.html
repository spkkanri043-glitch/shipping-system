<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日報確認 | 関ケ原プラ工業(株)</title>
<style>
:root {
  --pr:#1a3a5c; --prl:#2a5a8c;
  --ac:#e8a020;
  --bg:#edf1f6; --sf:#fff; --sf2:#f2f6fb; --sf3:#e8edf4;
  --tx:#1a2332; --tx2:#5a6a7a; --tx3:#9aabb8;
  --bd:#cfd9e6; --bd2:#adbace;
  --g:#0b7a3d; --gbg:#e3f6ed;
  --a:#b07000; --abg:#fff7db;
  --r:#b53030; --rbg:#fce8e8;
  --rad:10px; --rads:7px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;min-height:100vh;}

/* HEADER */
.header{height:52px;background:var(--pr);display:flex;align-items:center;padding:0 16px;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.25);position:sticky;top:0;z-index:100;}
.hic{width:32px;height:32px;background:rgba(232,160,32,.2);border:1px solid rgba(232,160,32,.4);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.htitle{color:#fff;font-size:16px;font-weight:700;flex:1;}
.hco{color:rgba(255,255,255,.55);font-size:11px;}

/* SETUP */
.setup{background:var(--abg);border:1px solid #fcd34d;border-radius:var(--rad);padding:14px 16px;margin:14px 14px 0;display:flex;flex-direction:column;gap:10px;}
.setup.hid{display:none;}
.setup-title{font-size:13px;font-weight:700;color:var(--a);}
.setup-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.setup-label{font-size:12px;color:var(--tx2);min-width:140px;font-weight:600;}
.setup-input{flex:1;min-width:260px;border:1px solid var(--bd2);border-radius:6px;padding:8px 11px;font-size:13px;background:#fff;outline:none;}
.setup-input:focus{border-color:var(--pr);}
.btn-primary{background:var(--pr);color:#fff;border:none;border-radius:6px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
.btn-primary:hover{background:var(--prl);}

.main{padding:12px 14px;}

/* フィルターパネル */
.filter-panel{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rad);padding:14px 16px;margin-bottom:12px;}
.filter-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.filter-label{font-size:12px;font-weight:700;color:var(--tx2);white-space:nowrap;}
.period-btn{padding:6px 13px;font-size:12px;font-weight:600;border:1px solid var(--bd2);border-radius:20px;background:var(--sf2);color:var(--tx2);cursor:pointer;white-space:nowrap;}
.period-btn.on{background:var(--pr);color:#fff;border-color:var(--pr);}
.date-inputs{display:flex;gap:5px;align-items:center;}
.date-input{border:1px solid var(--bd2);border-radius:6px;padding:6px 9px;font-size:12px;background:#fff;outline:none;color:var(--tx);}
.filter-selects{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px;}
@media(min-width:600px){.filter-selects{grid-template-columns:repeat(3,1fr);}}
.filter-group{display:flex;flex-direction:column;gap:4px;}
.filter-group label{font-size:11px;font-weight:700;color:var(--tx2);}
.filter-select{width:100%;border:1px solid var(--bd2);border-radius:6px;padding:7px 9px;font-size:12px;background:#fff;outline:none;color:var(--tx);cursor:pointer;}
.filter-select:focus{border-color:var(--pr);}
.filter-actions{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap;}
.btn-reload{padding:6px 13px;font-size:12px;font-weight:600;border:1px solid var(--bd2);border-radius:6px;background:var(--sf);color:var(--tx2);cursor:pointer;display:flex;align-items:center;gap:4px;}
.btn-reload:hover{background:var(--sf2);}
.btn-csv{padding:6px 13px;font-size:12px;font-weight:600;border:1px solid var(--g);border-radius:6px;background:var(--gbg);color:var(--g);cursor:pointer;display:flex;align-items:center;gap:4px;margin-left:auto;}
.btn-csv:hover{background:#bbf7d0;}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;}
.kpi-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rad);padding:13px 15px;position:relative;overflow:hidden;}
.kpi-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;border-radius:4px 0 0 4px;}
.kpi-card.blue::before{background:var(--pr);}
.kpi-card.green::before{background:var(--g);}
.kpi-card.amber::before{background:var(--ac);}
.kpi-card.red::before{background:var(--r);}
.kpi-label{font-size:11px;color:var(--tx2);margin-bottom:4px;}
.kpi-value{font-size:24px;font-weight:700;}
.kpi-card.blue .kpi-value{color:var(--pr);}
.kpi-card.green .kpi-value{color:var(--g);}
.kpi-card.amber .kpi-value{color:var(--ac);}
.kpi-card.red .kpi-value{color:var(--r);}
.kpi-sub{font-size:11px;color:var(--tx3);margin-top:3px;}

/* 担当者別サマリー */
.sec{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rad);padding:15px 16px;margin-bottom:12px;}
.sec-title{font-size:13px;font-weight:700;color:var(--pr);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;gap:6px;}
.sec-title-left{display:flex;align-items:center;gap:6px;}

/* 担当者カードグリッド */
.worker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-bottom:12px;}
.worker-summary-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rads);padding:12px 14px;cursor:pointer;transition:all .15s;}
.worker-summary-card:hover{border-color:var(--pr);box-shadow:0 2px 10px rgba(26,58,92,.12);}
.worker-summary-card.active{border-color:var(--pr);background:#f0f5ff;}
.wsc-name{font-size:14px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.wsc-avatar{width:26px;height:26px;border-radius:50%;background:var(--pr);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.wsc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;}
.wsc-stat{background:var(--sf2);border-radius:5px;padding:5px 6px;text-align:center;}
.wsc-stat-val{font-size:14px;font-weight:700;color:var(--pr);}
.wsc-stat-val.red{color:var(--r);}
.wsc-stat-lbl{font-size:9px;color:var(--tx3);margin-top:1px;}

/* レコード一覧テーブル */
.table-wrap{overflow-x:auto;}
.report-table{width:100%;border-collapse:collapse;font-size:12px;min-width:700px;}
.report-table th{font-size:11px;color:var(--tx2);font-weight:700;text-align:left;padding:8px 10px;border-bottom:2px solid var(--bd);background:var(--sf2);white-space:nowrap;position:sticky;top:0;}
.report-table td{padding:9px 10px;border-bottom:1px solid var(--bd);vertical-align:middle;}
.report-table tbody tr{cursor:pointer;transition:background .1s;}
.report-table tbody tr:hover td{background:var(--sf2);}
.report-table tbody tr:last-child td{border-bottom:none;}
.status-badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap;}
.status-complete{background:var(--gbg);color:var(--g);}
.status-working{background:#e8f0fe;color:var(--pr);}
.defect-badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;background:var(--rbg);color:var(--r);}
.no-defect{color:var(--tx3);font-size:11px;}
.photo-icon{color:var(--tx2);font-size:14px;}

/* モーダル */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:12px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--sf);border-radius:12px;width:100%;max-width:680px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.modal-header{padding:15px 18px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--sf);z-index:1;}
.modal-title{font-size:15px;font-weight:700;}
.modal-close{background:none;border:none;font-size:20px;color:var(--tx2);cursor:pointer;padding:2px 8px;border-radius:6px;}
.modal-close:hover{background:var(--sf2);}
.modal-body{padding:16px 18px;}

/* 詳細グリッド */
.detail-section{margin-bottom:16px;}
.detail-section-title{font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em;padding-bottom:6px;border-bottom:1px solid var(--bd);margin-bottom:10px;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:480px){.detail-grid{grid-template-columns:1fr;}}
.detail-item{}
.detail-label{font-size:10px;font-weight:700;color:var(--tx3);margin-bottom:3px;}
.detail-value{font-size:13px;font-weight:500;}
.detail-value.large{font-size:20px;font-weight:700;color:var(--pr);}
.detail-value.red{color:var(--r);font-weight:700;}

/* 不具合リスト（モーダル内） */
.defect-list-item{background:var(--rbg);border:1px solid rgba(181,48,48,.2);border-radius:var(--rads);padding:10px 12px;margin-bottom:6px;}
.defect-list-header{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;margin-bottom:4px;}
.defect-list-detail{font-size:12px;color:var(--tx2);}

/* 写真グリッド（モーダル内） */
.photo-grid{display:flex;gap:10px;flex-wrap:wrap;}
.photo-frame{border-radius:8px;overflow:hidden;border:1px solid var(--bd);width:180px;height:135px;flex-shrink:0;background:var(--sf2);display:flex;align-items:center;justify-content:center;}
.photo-frame img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-frame iframe{width:100%;height:100%;border:none;}

/* 一時停止ログ */
.pause-log-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--bd);font-size:12px;}
.pause-log-item:last-child{border-bottom:none;}
.pause-type{display:inline-block;padding:2px 7px;border-radius:999px;font-size:10px;font-weight:700;}
.pause-type.pause{background:var(--abg);color:var(--a);}
.pause-type.resume{background:var(--gbg);color:var(--g);}

/* 空・ローディング */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--tx2);gap:8px;flex-direction:column;}
.spinner{width:26px;height:26px;border:3px solid var(--bd);border-top-color:var(--pr);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:36px;color:var(--tx3);font-size:13px;}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a2332;color:#fff;padding:10px 22px;border-radius:999px;font-size:13px;font-weight:600;z-index:999;transition:transform .3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{background:var(--g);}
.toast.err{background:var(--r);}

/* ヘッダー右側 */
.header-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.header-user{color:rgba(255,255,255,.85);font-size:12px;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.header-user-dot{width:7px;height:7px;background:#34d399;border-radius:50%;flex-shrink:0;}
.btn-portal-back{padding:5px 11px;font-size:11px;font-weight:600;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:6px;cursor:pointer;white-space:nowrap;display:none;}
.btn-portal-back:hover{background:rgba(255,255,255,.2);}
.btn-portal-back.show{display:inline-flex;align-items:center;gap:4px;}
.pagination{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 0 4px;flex-wrap:wrap;}
.page-btn{padding:5px 11px;font-size:12px;font-weight:600;border:1px solid var(--bd2);border-radius:6px;background:var(--sf);color:var(--tx2);cursor:pointer;}
.page-btn.on{background:var(--pr);color:#fff;border-color:var(--pr);}
.page-btn:hover:not(.on):not(:disabled){background:var(--sf2);}
.page-btn:disabled{opacity:.4;cursor:not-allowed;}
.page-info{font-size:12px;color:var(--tx2);}
</style>
</head>
<body>

<div class="header">
  <div class="hic">📋</div>
  <div class="htitle">日報確認</div>
  <div class="header-right">
    <div class="header-user" id="header-user" style="display:none">
      <div class="header-user-dot"></div>
      <span id="header-user-name"></span>
    </div>
    <button class="btn-portal-back" id="btn-portal-back" onclick="goPortal()">✕ タブを閉じる</button>
  </div>
</div>

<!-- GAS URL設定 -->
<div class="setup" id="setup">
  <div class="setup-title">⚙️ 作業報告書GASのURLを設定してください</div>
  <div class="setup-row">
    <span class="setup-label">作業報告書 GAS URL</span>
    <input class="setup-input" id="gas-url-input" type="text" placeholder="https://script.google.com/macros/s/.../exec">
  </div>
  <div><button class="btn-primary" onclick="saveUrl()">接続する</button></div>
</div>

<div class="main">

  <!-- フィルターパネル -->
  <div class="filter-panel">
    <div class="filter-top">
      <span class="filter-label">期間:</span>
      <button class="period-btn on" id="p-today"  onclick="setPeriod('today')">今日</button>
      <button class="period-btn"    id="p-7"      onclick="setPeriod(7)">直近7日</button>
      <button class="period-btn"    id="p-30"     onclick="setPeriod(30)">直近30日</button>
      <button class="period-btn"    id="p-0"      onclick="setPeriod(0)">全期間</button>
      <div class="date-inputs">
        <input class="date-input" type="date" id="date-from" onchange="clearPeriodBtn();applyFilter()">
        <span style="color:var(--tx3);font-size:12px">〜</span>
        <input class="date-input" type="date" id="date-to" onchange="clearPeriodBtn();applyFilter()">
      </div>
    </div>
    <div class="filter-selects">
      <div class="filter-group">
        <label>👤 担当者(報告者)</label>
        <select class="filter-select" id="f-worker" onchange="applyFilter()">
          <option value="">すべて</option>
        </select>
      </div>
      <div class="filter-group">
        <label>📦 品番</label>
        <select class="filter-select" id="f-part" onchange="applyFilter()">
          <option value="">すべて</option>
        </select>
      </div>
      <div class="filter-group">
        <label>🔧 作業項目</label>
        <select class="filter-select" id="f-sakugyo" onchange="applyFilter()">
          <option value="">すべて</option>
        </select>
      </div>
    </div>
    <div class="filter-actions">
      <button class="btn-reload" onclick="loadData()">🔄 更新</button>
      <span id="filter-count" style="font-size:12px;color:var(--tx2)"></span>
      <button class="btn-csv" onclick="exportCSV()">⬇️ CSVダウンロード</button>
    </div>
  </div>

  <!-- KPI -->
  <div class="kpi-grid">
    <div class="kpi-card blue"> <div class="kpi-label">作業件数</div>   <div class="kpi-value" id="kpi-cnt">—</div>   <div class="kpi-sub">件</div></div>
    <div class="kpi-card amber"><div class="kpi-label">合計作業時間</div><div class="kpi-value" id="kpi-time">—</div>  <div class="kpi-sub">分</div></div>
    <div class="kpi-card red">  <div class="kpi-label">不具合 合計</div><div class="kpi-value" id="kpi-defect">—</div><div class="kpi-sub">個</div></div>
  </div>

  <!-- 担当者別サマリー -->
  <div class="sec" id="worker-summary-sec" style="display:none">
    <div class="sec-title">
      <div class="sec-title-left">👤 担当者(報告者)別サマリー</div>
      <span style="font-size:11px;color:var(--tx3);font-weight:400">クリックで絞り込み</span>
    </div>
    <div class="worker-grid" id="worker-grid"></div>
  </div>

  <!-- 一覧テーブル -->
  <div class="sec">
    <div class="sec-title">
      <div class="sec-title-left">📄 作業報告一覧</div>
      <span id="table-count" style="font-size:11px;color:var(--tx2);font-weight:400"></span>
    </div>
    <div id="table-area"><div class="loading"><div class="spinner"></div>読み込み中...</div></div>
    <div id="pagination-area" class="pagination"></div>
  </div>

</div><!-- /main -->

<!-- 詳細モーダル -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">作業詳細</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// 作業報告書 GAS URL（固定）
// ============================================================
const REPORT_GAS_URL_FIXED = 'https://script.google.com/macros/s/AKfycby-AS3uRATUSAmLb5kqyfxuTy-Y1jDTg4SnbXbqAKpSjEYwlId1n86dHw0sQqmbu3sDEw/exec';

const LS_KEY = 'daily_report_gas_url';
let gasUrl = REPORT_GAS_URL_FIXED; // URLパラメータ > 固定値
let allReports = [];
let filtered   = [];
const PAGE_SIZE = 30;
let currentPage = 1;
let activeWorker = '';
let portalUrl = ''; // ポータルに戻るURL

// 起動
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(location.search);

  // ① GAS URL：URLパラメータ優先、なければ固定値
  const fromUrl = params.get('report_url') || params.get('gas_url');
  if (fromUrl) {
    gasUrl = fromUrl;
    localStorage.setItem(LS_KEY, fromUrl);
  } else {
    const saved = localStorage.getItem(LS_KEY);
    if (saved) gasUrl = saved;
  }
  // 常にセットアップパネルを非表示（URL固定のため）
  document.getElementById('setup').classList.add('hid');
  document.getElementById('gas-url-input').value = gasUrl;

  // ② SSO：ユーザー名をヘッダーに表示
  const sso = params.get('sso');
  if (sso) {
    try {
      const pl = JSON.parse(decodeURIComponent(escape(atob(sso.split('').reverse().join('')))));
      if (pl && pl.name) {
        document.getElementById('header-user-name').textContent = pl.name;
        document.getElementById('header-user').style.display = 'flex';
      }
    } catch(e) {}
  }

  // ③ ポータルURL：戻るボタンの表示制御
  const portalParam = params.get('portal_url');
  if (portalParam) {
    portalUrl = portalParam;
    localStorage.setItem('daily_report_portal_url', portalParam);
  } else {
    portalUrl = localStorage.getItem('daily_report_portal_url') || '';
  }
  if (portalUrl) {
    document.getElementById('btn-portal-back').classList.add('show');
  }

  setPeriodDates('today');
  loadData();
});

function saveUrl() {
  const v = document.getElementById('gas-url-input').value.trim();
  if (!v) { showToast('URLを入力してください', 'err'); return; }
  gasUrl = v; localStorage.setItem(LS_KEY, v);
  document.getElementById('setup').classList.add('hid');
  showToast('接続しました', 'ok');
  loadData();
}

function goPortal() {
  // 別タブで開かれているので、このタブを閉じてポータルに戻る
  try {
    window.close();
    // window.close() が効かない場合（直接開いた場合）はポータルURLへ遷移
    setTimeout(() => {
      if (portalUrl && !portalUrl.includes('googleusercontent')) {
        window.location.href = portalUrl;
      } else {
        showToast('このタブを閉じてポータルに戻ってください', '');
      }
    }, 300);
  } catch(e) {
    showToast('このタブを閉じてポータルに戻ってください', '');
  }
}

// データ取得
async function loadData() {
  if (!gasUrl) { showToast('GAS URLを設定してください', 'err'); return; }
  document.getElementById('table-area').innerHTML = '<div class="loading"><div class="spinner"></div>読み込み中...</div>';
  try {
    const res = await fetch(`${gasUrl}?action=getReports`);
    const d = await res.json();
    allReports = (d.data || []).filter(r => r['完了フラグ'] === '完了');
    buildFilterOptions();
    applyFilter();
  } catch(e) {
    document.getElementById('table-area').innerHTML = '<div class="empty">❌ データ取得失敗<br><small>GAS URLを確認してください</small></div>';
    showToast('取得失敗: ' + e.message, 'err');
  }
}

// フィルターオプション構築
function buildFilterOptions() {
  const workers  = [...new Set(allReports.map(r => r['担当者']).filter(Boolean))].sort();
  const parts    = [...new Set(allReports.map(r => r['品番']).filter(Boolean))].sort();
  const sakugyos = [...new Set(allReports.map(r => r['作業項目']).filter(Boolean))].sort();
  fillSelect('f-worker',  workers);
  fillSelect('f-part',    parts);
  fillSelect('f-sakugyo', sakugyos);
}

function fillSelect(id, opts) {
  const sel = document.getElementById(id);
  const cur = sel.value;
  sel.innerHTML = '<option value="">すべて</option>';
  opts.forEach(o => {
    const opt = document.createElement('option');
    opt.value = o; opt.textContent = o;
    if (o === cur) opt.selected = true;
    sel.appendChild(opt);
  });
}

// 期間
function setPeriod(key) {
  ['today','7','30','0'].forEach(k => document.getElementById('p-'+k)?.classList.toggle('on', String(k)===String(key)));
  setPeriodDates(key);
  applyFilter();
}

function clearPeriodBtn() {
  ['today','7','30','0'].forEach(k => document.getElementById('p-'+k)?.classList.remove('on'));
}

function setPeriodDates(key) {
  const today = new Date();
  const to = fmtDate(today);
  let from;
  if (key === 'today') { from = to; }
  else if (key === 0)  { from = '2020-01-01'; }
  else { const d = new Date(); d.setDate(today.getDate() - Number(key)); from = fmtDate(d); }
  document.getElementById('date-from').value = from;
  document.getElementById('date-to').value   = to;
}

function fmtDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function fmtDateTime(val) {
  if (!val) return '—';
  try {
    const d = new Date(String(val).replace(' ', 'T'));
    if (isNaN(d)) return String(val);
    return d.getFullYear() + '/' +
      String(d.getMonth()+1).padStart(2,'0') + '/' +
      String(d.getDate()).padStart(2,'0') + ' ' +
      String(d.getHours()).padStart(2,'0') + ':' +
      String(d.getMinutes()).padStart(2,'0');
  } catch(e) { return String(val); }
}

// フィルター適用
function applyFilter() {
  const from = document.getElementById('date-from').value;
  const to   = document.getElementById('date-to').value;
  // "YYYY-MM-DD" をそのまま文字列比較用のプレフィックスとして使う（タイムゾーンずれ回避）
  const fromStr = from || '2020-01-01';
  const toStr   = to   || fmtDate(new Date());
  const fWorker  = activeWorker || document.getElementById('f-worker').value;
  const fPart    = document.getElementById('f-part').value;
  const fSakugyo = document.getElementById('f-sakugyo').value;

  filtered = allReports.filter(r => {
    // 作成日時の先頭10文字（YYYY-MM-DD または YYYY/MM/DD）を正規化して比較
    const raw = String(r['作成日時'] || '');
    if (!raw) return false;
    const dateStr = raw.slice(0,10).replace(/\//g, '-'); // "YYYY-MM-DD" に統一
    if (dateStr < fromStr || dateStr > toStr) return false;
    if (fWorker  && r['担当者']   !== fWorker)  return false;
    if (fPart    && r['品番']     !== fPart)    return false;
    if (fSakugyo && r['作業項目'] !== fSakugyo) return false;
    return true;
  });

  currentPage = 1;
  renderKpi();
  renderWorkerSummary();
  renderTable();
}

// KPI
function renderKpi() {
  const cnt    = filtered.length;
  const time   = filtered.reduce((s,r) => s + (Number(r['作業時間分'])||0), 0);
  const defect = filtered.reduce((s,r) => s + (Number(r['不具合数'])||0), 0);
  document.getElementById('kpi-cnt').textContent    = cnt.toLocaleString();
  document.getElementById('kpi-time').textContent   = time.toLocaleString();
  document.getElementById('kpi-defect').textContent = defect.toLocaleString();
  document.getElementById('filter-count').textContent = `${cnt} 件`;
}

// 担当者サマリー
function renderWorkerSummary() {
  const map = {};
  filtered.forEach(r => {
    const k = r['担当者'] || '不明';
    if (!map[k]) map[k] = {cnt:0, total:0, time:0, defect:0};
    map[k].cnt++;
    map[k].total  += Number(r['合計'])||0;
    map[k].time   += Number(r['作業時間分'])||0;
    map[k].defect += Number(r['不具合数'])||0;
  });
  const workers = Object.entries(map).sort((a,b) => b[1].cnt - a[1].cnt);
  const sec = document.getElementById('worker-summary-sec');
  if (workers.length < 2) { sec.style.display='none'; return; }
  sec.style.display = 'block';
  document.getElementById('worker-grid').innerHTML = workers.map(([name, d]) => `
    <div class="worker-summary-card ${activeWorker===name?'active':''}" onclick="toggleWorkerFilter('${name.replace(/'/g,"\\'")}')">
      <div class="wsc-name">
        <div class="wsc-avatar">${name.slice(0,1)}</div>
        <span>${name}</span>
      </div>
      <div class="wsc-stats">
        <div class="wsc-stat"><div class="wsc-stat-val">${d.cnt}</div><div class="wsc-stat-lbl">件数</div></div>
        <div class="wsc-stat"><div class="wsc-stat-val">${d.total.toLocaleString()}</div><div class="wsc-stat-lbl">合計数</div></div>
        <div class="wsc-stat"><div class="wsc-stat-val red">${d.defect}</div><div class="wsc-stat-lbl">不具合</div></div>
      </div>
    </div>`).join('');
}

function toggleWorkerFilter(name) {
  activeWorker = activeWorker === name ? '' : name;
  applyFilter();
}

// テーブル描画（ページネーション付き）
function renderTable() {
  if (!filtered.length) {
    document.getElementById('table-area').innerHTML = '<div class="empty">📋 該当する作業報告がありません</div>';
    document.getElementById('pagination-area').innerHTML = '';
    document.getElementById('table-count').textContent = '';
    return;
  }

  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageData = filtered.slice(start, start + PAGE_SIZE);

  document.getElementById('table-count').textContent = `${filtered.length} 件`;

  const rows = pageData.map((r, i) => {
    const idx = start + i;
    const hasPhoto = r['写真1'] || r['写真2'] || r['写真3'];
    const hasDefect = Number(r['不具合数']) > 0;
    const dt = fmtDateTime(r['作成日時']);
    const date = dt.slice(0,10);
    const timeStr = dt.slice(11,16);
    return `<tr onclick="openDetail(${idx})">
      <td style="white-space:nowrap;color:var(--tx2);font-size:11px">${date}<br><span style="color:var(--tx3)">${timeStr}</span></td>
      <td style="font-weight:600">${r['担当者']||'—'}</td>
      <td>${r['作業項目']||'—'}</td>
      <td style="font-family:monospace;font-size:11px">${r['品番']||'—'}</td>
      <td style="text-align:center">${r['カウント']||0} 箱</td>
      <td style="text-align:center;font-weight:700;color:var(--pr)">${(Number(r['合計'])||0).toLocaleString()}</td>
      <td style="text-align:center">${r['作業時間分']||0} 分</td>
      <td style="text-align:center">
        ${hasDefect ? `<span class="defect-badge">${r['不具合数']}個</span>` : `<span class="no-defect">なし</span>`}
      </td>
      <td style="text-align:center">${hasPhoto ? '<span class="photo-icon">📷</span>' : '—'}</td>
    </tr>`;
  }).join('');

  document.getElementById('table-area').innerHTML = `
    <div class="table-wrap">
      <table class="report-table">
        <thead><tr>
          <th>作成日時</th>
          <th>担当者(報告者)</th>
          <th>作業項目</th>
          <th>品番</th>
          <th>カウント</th>
          <th>合計数量</th>
          <th>作業時間</th>
          <th>不具合</th>
          <th>写真</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

  // ページネーション
  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  if (totalPages <= 1) { document.getElementById('pagination-area').innerHTML = ''; return; }
  const pg = currentPage;
  let btns = '';
  btns += `<button class="page-btn" onclick="goPage(${pg-1})" ${pg<=1?'disabled':''}>‹ 前</button>`;
  const range = [];
  for (let i = Math.max(1,pg-2); i <= Math.min(totalPages,pg+2); i++) range.push(i);
  if (range[0] > 1) btns += `<button class="page-btn" onclick="goPage(1)">1</button>${range[0]>2?'<span class="page-info">…</span>':''}`;
  range.forEach(i => { btns += `<button class="page-btn ${i===pg?'on':''}" onclick="goPage(${i})">${i}</button>`; });
  if (range[range.length-1] < totalPages) btns += `${range[range.length-1]<totalPages-1?'<span class="page-info">…</span>':''}<button class="page-btn" onclick="goPage(${totalPages})">${totalPages}</button>`;
  btns += `<button class="page-btn" onclick="goPage(${pg+1})" ${pg>=totalPages?'disabled':''}>次 ›</button>`;
  btns += `<span class="page-info">${pg} / ${totalPages} ページ</span>`;
  document.getElementById('pagination-area').innerHTML = btns;
}

function goPage(p) {
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  renderTable();
  document.querySelector('.sec:last-child')?.scrollIntoView({behavior:'smooth',block:'start'});
}

// 詳細モーダル
function openDetail(idx) {
  const r = filtered[idx];
  if (!r) return;
  const isFinal = r['完了フラグ'] === '完了';

  // 不具合詳細パース
  let defectItems = [];
  try { defectItems = JSON.parse(r['不具合詳細'] || '[]'); } catch(e) {}

  // 一時停止ログパース
  let pauseLog = [];
  try { pauseLog = JSON.parse(r['一時停止ログ'] || '[]'); } catch(e) {}

  // 写真
  const photos = [r['写真1'], r['写真2'], r['写真3']].filter(Boolean);
  const photoHtml = photos.length
    ? `<div class="photo-grid">
        ${photos.map(url => {
          if (url.includes('/preview')) {
            return `<div class="photo-frame"><iframe src="${url}" allowfullscreen></iframe></div>`;
          }
          return `<div class="photo-frame"><a href="${url}" target="_blank"><img src="${url}" alt="写真" onerror="this.parentElement.innerHTML='📷'"></a></div>`;
        }).join('')}
      </div>`
    : '<span style="color:var(--tx3);font-size:12px">写真なし</span>';

  // 不具合リスト
  const defectHtml = defectItems.length
    ? defectItems.map((d,i) => `
        <div class="defect-list-item">
          <div class="defect-list-header">
            <span style="font-weight:700;color:var(--r)">不具合 #${i+1}</span>
            ${d.worker ? `<span>作業者: <strong>${d.worker}</strong></span>` : ''}
            ${d.type   ? `<span>種類: <strong>${d.type}</strong></span>` : ''}
            ${d.count  ? `<span>不良数: <strong>${d.count}個</strong></span>` : ''}
          </div>
          ${d.detail ? `<div class="defect-list-detail">${d.detail}</div>` : ''}
        </div>`).join('')
    : (Number(r['不具合数'])>0
        ? `<div class="defect-list-item"><div class="defect-list-header"><span style="color:var(--r)">不具合数: ${r['不具合数']}個</span></div>${r['不具合内容']?`<div class="defect-list-detail">${r['不具合内容']}</div>`:''}</div>`
        : '<span style="color:var(--tx3);font-size:12px">不具合なし</span>');

  // 一時停止ログ
  const pauseHtml = pauseLog.length
    ? `<div>${pauseLog.map(l => `
        <div class="pause-log-item">
          <span class="pause-type ${l.type}">${l.type==='pause'?'⏸ 一時停止':'▶ 再開'}</span>
          <span>${fmtDateTime(l.time)}</span>
        </div>`).join('')}</div>`
    : '<span style="color:var(--tx3);font-size:12px">一時停止なし</span>';

  document.getElementById('modal-title').textContent = `作業詳細 — ${r['担当者']||''} ${String(r['作成日時']||'').slice(0,10)}`;
  document.getElementById('modal-body').innerHTML = `

    <!-- 基本情報 -->
    <div class="detail-section">
      <div class="detail-section-title">📋 基本情報</div>
      <div class="detail-grid">
        <div class="detail-item"><div class="detail-label">報告ID</div><div class="detail-value" style="font-size:11px;font-family:monospace">${r['id']||'—'}</div></div>
        <div class="detail-item"><div class="detail-label">ステータス</div><div class="detail-value"><span class="status-badge ${isFinal?'status-complete':'status-working'}">${isFinal?'✔ 完了':'作業中'}</span></div></div>
        <div class="detail-item"><div class="detail-label">担当者(報告者)</div><div class="detail-value" style="font-weight:700">${r['担当者']||'—'}</div></div>
        <div class="detail-item"><div class="detail-label">作業項目</div><div class="detail-value">${r['作業項目']||'—'}</div></div>
        <div class="detail-item"><div class="detail-label">作成日時</div><div class="detail-value">${fmtDateTime(r['作成日時'])}</div></div>
        <div class="detail-item"><div class="detail-label">終了日時</div><div class="detail-value">${fmtDateTime(r['終了日時'])}</div></div>
      </div>
    </div>

    <!-- 製品・数量 -->
    <div class="detail-section">
      <div class="detail-section-title">📦 製品・数量</div>
      <div class="detail-grid">
        <div class="detail-item"><div class="detail-label">品番</div><div class="detail-value" style="font-family:monospace">${r['品番']||'—'}</div></div>
        <div class="detail-item"><div class="detail-label">基本取引先</div><div class="detail-value">${r['基本取引先']||'—'}</div></div>
        <div class="detail-item"><div class="detail-label">箱入数</div><div class="detail-value">${r['箱入数']||'—'} 個/箱</div></div>
        <div class="detail-item"><div class="detail-label">カウント</div><div class="detail-value">${r['カウント']||0} 箱</div></div>
        <div class="detail-item"><div class="detail-label">合計数量</div><div class="detail-value large">${(Number(r['合計'])||0).toLocaleString()} 個</div></div>
        <div class="detail-item"><div class="detail-label">作業時間</div><div class="detail-value">${r['作業時間分']||0} 分</div></div>
      </div>
    </div>

    <!-- 不具合 -->
    <div class="detail-section">
      <div class="detail-section-title">⚠️ 不具合情報</div>
      ${defectHtml}
      ${r['不具合内容'] && !defectItems.length ? '' : (r['不具合内容'] ? `<div style="margin-top:8px;font-size:12px;color:var(--tx2)">フリー記入: ${r['不具合内容']}</div>` : '')}
    </div>

    <!-- 写真 -->
    <div class="detail-section">
      <div class="detail-section-title">📷 写真</div>
      ${photoHtml}
    </div>

    <!-- 一時停止ログ -->
    <div class="detail-section">
      <div class="detail-section-title">⏸ 一時停止ログ</div>
      ${pauseHtml}
    </div>
  `;
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e => { if (e.target===document.getElementById('modal')) closeModal(); });

// CSVエクスポート
function exportCSV() {
  if (!filtered.length) { showToast('エクスポートするデータがありません', 'err'); return; }
  const headers = ['報告ID','作成日時','終了日時','担当者','作業項目','品番','基本取引先','箱入数','カウント','合計数量','作業時間分','不具合数','不具合内容','完了フラグ'];
  const escape = v => `"${String(v??'').replace(/"/g,'""')}"`;
  const rows = filtered.map(r => headers.map(h => {
    const keyMap = {'報告ID':'id','合計数量':'合計'};
    const k = keyMap[h] || h;
    return escape(r[k]??'');
  }).join(','));
  const bom = '\uFEFF';
  const csv = bom + [headers.map(escape).join(','), ...rows].join('\r\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url  = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `日報_${document.getElementById('date-from').value}_${document.getElementById('date-to').value}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSVをダウンロードしました', 'ok');
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' '+type : '');
  setTimeout(() => t.classList.remove('show'), 2800);
}
