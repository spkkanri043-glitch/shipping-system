<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>作業報告書 | 関ケ原プラ工業(株)</title>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --pr: #1a3a5c; --prl: #2a5a8c;
  --ac: #e8a020;
  --bg: #edf1f6; --sf: #fff; --sf2: #f2f6fb; --sf3: #e8edf4;
  --tx: #1a2332; --tx2: #5a6a7a; --tx3: #9aabb8;
  --bd: #cfd9e6; --bd2: #adbace;
  --g: #0b7a3d; --gbg: #e3f6ed;
  --a: #b07000; --abg: #fff7db;
  --r: #b53030; --rbg: #fce8e8;
  --pause: #d97706; --pausebg: #fef3c7;
  --rad: 10px; --rads: 7px;
  --sab: env(safe-area-inset-bottom, 0px);
}

html { height: 100%; -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
  background: var(--bg); color: var(--tx); font-size: 14px;
  min-height: 100%; -webkit-font-smoothing: antialiased; overflow-x: hidden;
}

/* ===== SCREENS ===== */
.screen { display: none; }
.screen.on { display: flex; flex-direction: column; min-height: 100vh; }

/* ===== LOGIN ===== */
#s-login {
  min-height: 100vh;
  background: linear-gradient(150deg, #071828 0%, #1a3a5c 55%, #071828 100%);
  display: none; align-items: center; justify-content: center; padding: 20px 16px;
}
#s-login.on { display: flex; }
.lbox { width: 100%; max-width: 340px; margin: 0 auto; }
.llogo { text-align: center; margin-bottom: 1.6rem; }
.lring {
  width: 60px; height: 60px; border-radius: 50%;
  border: 2px solid rgba(232,160,32,.6); background: rgba(232,160,32,.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; margin: 0 auto 10px;
}
.lco { font-size: 17px; font-weight: 700; color: #fff; }
.lsub { font-size: 11px; color: rgba(255,255,255,.5); margin-top: 3px; }
.lcard {
  background: #fff; border-radius: 14px; padding: 1.5rem;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
}
.lcard-title { font-size: 13px; font-weight: 700; color: var(--tx); text-align: center; margin-bottom: 1rem; padding-bottom: 10px; border-bottom: 1px solid var(--bd); }
.fg { margin-bottom: .75rem; }
.fl { font-size: 12px; color: var(--tx2); display: block; margin-bottom: 4px; font-weight: 500; }
.fi {
  width: 100%; padding: 11px 12px; font-size: 16px;
  border: 1px solid var(--bd2); border-radius: var(--rads);
  background: #f8fafc; color: var(--tx); outline: none;
  font-family: inherit; -webkit-appearance: none; transition: border .15s;
}
.fi:focus { border-color: var(--pr); }
select.fi { cursor: pointer; }
.btnl {
  width: 100%; padding: 13px; background: var(--pr); color: #fff;
  border: none; border-radius: var(--rads); font-size: 15px; font-weight: 600;
  cursor: pointer; font-family: inherit; -webkit-appearance: none; letter-spacing: .5px;
}
.btnl:active { background: var(--prl); }
.btnl:disabled { opacity: .6; cursor: not-allowed; }
.lerr {
  background: var(--rbg); color: var(--r);
  border: 1px solid rgba(181,48,48,.2); border-radius: var(--rads);
  padding: 9px 12px; font-size: 12px; margin-bottom: .75rem; text-align: center;
}
.login-back {
  text-align: center; margin-top: 14px;
  font-size: 12px; color: rgba(255,255,255,.5); cursor: pointer;
  text-decoration: underline;
}

/* ===== TOPBAR ===== */
.topbar {
  background: var(--pr); padding: 0 14px; height: 48px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 8px rgba(0,0,0,.28); flex-shrink: 0;
  position: sticky; top: 0; z-index: 100; width: 100%;
}
.tbl { display: flex; align-items: center; gap: 8px; min-width: 0; }
.tbic {
  width: 30px; height: 30px; border-radius: 50%;
  background: rgba(232,160,32,.2); border: 1px solid rgba(232,160,32,.4);
  display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0;
}
.tbco { font-size: 13px; font-weight: 700; color: #fff; }
.tbmd { font-size: 10px; color: rgba(255,255,255,.5); }
.tbr { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.user-chip {
  background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2);
  color: rgba(255,255,255,.9); font-size: 11px; font-weight: 600;
  padding: 3px 9px; border-radius: 20px; max-width: 90px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.btn-logout {
  padding: 5px 10px; font-size: 11px;
  background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.22);
  color: #fff; border-radius: 5px; cursor: pointer; white-space: nowrap;
}

/* ===== CONTENT ===== */
.content { padding: 14px; flex: 1; }

/* ===== STATUS BAR ===== */
.status-bar {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--sf); border: 1px solid var(--bd);
  border-radius: var(--rads); padding: 10px 14px; margin-bottom: 12px;
}
.status-bar.working { border-left: 4px solid var(--g); }
.status-bar.paused  { border-left: 4px solid var(--pause); background: var(--pausebg); }
.status-label { font-size: 12px; font-weight: 700; }
.status-label.working { color: var(--g); }
.status-label.paused  { color: var(--pause); }
.status-time  { color: var(--tx2); font-size: 11px; margin-top: 2px; }
.status-timer { font-size: 22px; font-weight: 700; font-family: 'Courier New', monospace; color: var(--pr); letter-spacing: 1px; }

/* ===== PAUSE / RESUME ===== */
.work-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.btn-pause, .btn-resume, .btn-end {
  padding: 14px; font-size: 14px; font-weight: 700;
  border: none; border-radius: var(--rads); cursor: pointer;
  font-family: inherit; -webkit-appearance: none; transition: all .15s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-pause  { background: var(--pausebg); color: var(--pause); border: 2px solid rgba(217,119,6,.3); }
.btn-pause:active  { background: #fde68a; }
.btn-resume { background: var(--gbg); color: var(--g); border: 2px solid rgba(11,122,61,.3); }
.btn-resume:active { background: #bbf7d0; }
.btn-end    { background: var(--rbg); color: var(--r); border: 2px solid rgba(181,48,48,.25); grid-column: 1/-1; }
.btn-end:active    { background: #fecaca; }
.btn-pause:disabled, .btn-resume:disabled { opacity: .4; cursor: not-allowed; }

/* ===== SECTION CARD ===== */
.section-card {
  background: var(--sf); border: 1px solid var(--bd);
  border-radius: var(--rad); padding: 14px; margin-bottom: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,.04);
}
.sc-title {
  font-size: 12px; font-weight: 700; color: var(--pr);
  margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--bd);
  display: flex; align-items: center; gap: 6px; letter-spacing: .3px;
}
.frow { margin-bottom: 11px; }
.frow:last-child { margin-bottom: 0; }
.fl2 { font-size: 11px; color: var(--tx2); font-weight: 600; margin-bottom: 5px; display: flex; align-items: center; gap: 4px; }
.req { color: var(--r); font-size: 10px; }
.fi2 {
  width: 100%; padding: 11px 12px; font-size: 16px;
  border: 1px solid var(--bd2); border-radius: var(--rads);
  background: #f8fafc; color: var(--tx);
  outline: none; font-family: inherit; -webkit-appearance: none; transition: border .15s;
}
.fi2:focus  { border-color: var(--pr); background: #fff; }
.fi2.filled { background: #f0f8f0; border-color: #86efac; }
.fi2.err    { border-color: var(--r) !important; background: var(--rbg); }
.fi2[readonly] { background: var(--sf3); color: var(--tx2); cursor: default; }
select.fi2 { cursor: pointer; }
textarea.fi2 { resize: none; line-height: 1.6; }

/* ===== SCAN ===== */
.scan-tabs { display: flex; gap: 6px; margin-bottom: 8px; }
.scan-tab {
  flex: 1; padding: 6px; font-size: 11px; font-weight: 600;
  border: 1px solid var(--bd2); border-radius: 5px;
  background: var(--sf2); color: var(--tx2); cursor: pointer; text-align: center;
}
.scan-tab.on { background: var(--pr); color: #fff; border-color: transparent; }
.scan-area { display: flex; gap: 8px; align-items: stretch; }
.scan-area .fi2 { flex: 1; }
.btn-scan {
  padding: 0 14px; min-width: 58px; height: 46px;
  background: var(--pr); color: #fff; border: none;
  border-radius: var(--rads); cursor: pointer; font-size: 20px;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
}
.btn-scan:active { background: var(--prl); }
.scan-result-tag {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--gbg); color: var(--g);
  border: 1px solid rgba(11,122,61,.2);
  border-radius: 20px; padding: 3px 10px; font-size: 11px;
  font-weight: 600; margin-top: 5px;
}

/* ===== COUNT ===== */
.count-wrap { border: 1px solid var(--bd2); border-radius: var(--rads); overflow: hidden; background: #f8fafc; display: flex; }
.count-btn {
  width: 62px; height: 56px; border: none; cursor: pointer;
  font-size: 28px; font-weight: 700; font-family: inherit;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; background: transparent; transition: background .12s; color: var(--pr);
}
.count-btn.minus { color: var(--r); }
.count-btn:active  { background: var(--sf3); }
.count-btn:disabled { opacity: .3; cursor: not-allowed; }
.count-display {
  flex: 1; text-align: center; font-size: 30px; font-weight: 700; color: var(--pr);
  border-left: 1px solid var(--bd); border-right: 1px solid var(--bd);
  padding: 10px 0; font-variant-numeric: tabular-nums;
}
.count-unit { font-size: 12px; color: var(--tx2); text-align: center; margin-top: 5px; }
.total-row {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--sf2); border: 1px solid var(--bd);
  border-radius: var(--rads); padding: 11px 14px; margin-top: 10px;
}
.total-label { font-size: 12px; color: var(--tx2); font-weight: 600; }
.total-value { font-size: 24px; font-weight: 700; color: var(--pr); }
.total-unit  { font-size: 12px; color: var(--tx2); margin-left: 4px; }

/* ===== DEFECT ===== */
.defect-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.btn-add-defect {
  padding: 6px 13px; font-size: 12px; font-weight: 600;
  background: var(--r); color: #fff; border: none;
  border-radius: var(--rads); cursor: pointer; font-family: inherit;
}
.defect-item {
  background: var(--rbg); border: 1px solid rgba(181,48,48,.2);
  border-radius: var(--rads); padding: 10px 12px; margin-bottom: 8px; position: relative;
}
.defect-no  { font-size: 11px; font-weight: 700; color: var(--r); margin-bottom: 6px; }
.defect-del {
  position: absolute; top: 7px; right: 8px; width: 26px; height: 26px;
  border: none; background: none; color: var(--r); cursor: pointer;
  font-size: 19px; display: flex; align-items: center; justify-content: center;
}
.defect-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.defect-fi {
  width: 100%; padding: 8px 10px; font-size: 15px;
  border: 1px solid rgba(181,48,48,.3); border-radius: 5px;
  background: #fff; color: var(--tx); font-family: inherit; outline: none;
  margin-top: 4px; -webkit-appearance: none;
}
.defect-textarea {
  width: 100%; padding: 8px 10px; font-size: 14px;
  border: 1px solid rgba(181,48,48,.3); border-radius: 5px;
  background: #fff; color: var(--tx); font-family: inherit;
  outline: none; resize: none; min-height: 56px; margin-top: 6px;
}
.defect-empty { font-size: 12px; color: var(--tx3); text-align: center; padding: 14px; }

/* ===== SUBMIT ===== */
.btn-submit {
  width: 100%; padding: 16px; font-size: 16px; font-weight: 700;
  background: var(--pr); color: #fff; border: none;
  border-radius: var(--rads); cursor: pointer; font-family: inherit;
  letter-spacing: .5px; box-shadow: 0 4px 14px rgba(26,58,92,.35);
  -webkit-appearance: none; margin-bottom: 8px;
}
.btn-submit:active   { background: var(--prl); }
.btn-submit:disabled { opacity: .5; cursor: not-allowed; }
.submit-note { font-size: 11px; color: var(--tx3); text-align: center; }

/* ===== CAMERA MODAL ===== */
.cam-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.9);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 500; padding: 16px;
}
.cam-overlay.hid { display: none; }
.cam-label { color: rgba(255,255,255,.7); font-size: 13px; font-weight: 600; margin-bottom: 12px; letter-spacing: .5px; }
.cam-box   { width: 100%; max-width: 360px; background: #000; border-radius: 14px; overflow: hidden; position: relative; }
#cam-video { width: 100%; display: block; }
.cam-aim   { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
.cam-frame { width: 200px; height: 130px; border: 2.5px solid var(--ac); border-radius: 8px; box-shadow: 0 0 0 9999px rgba(0,0,0,.4); }
.cam-status { position: absolute; bottom: 10px; left: 0; right: 0; text-align: center; color: rgba(255,255,255,.7); font-size: 12px; }
.cam-footer { margin-top: 16px; }
.btn-cam-cancel {
  padding: 12px 32px; font-size: 14px; font-weight: 600;
  background: rgba(255,255,255,.15); color: #fff;
  border: 1px solid rgba(255,255,255,.3); border-radius: var(--rads); cursor: pointer; font-family: inherit;
}

/* ===== COMPLETE ===== */
#s-complete {
  min-height: 100vh;
  background: linear-gradient(160deg, #071828 0%, #0b4a2a 60%, #071828 100%);
  display: none; align-items: center; justify-content: center; padding: 20px;
}
#s-complete.on { display: flex; flex-direction: column; }
.cmp-box  { text-align: center; max-width: 320px; margin: 0 auto; }
.cmp-icon {
  width: 80px; height: 80px; border-radius: 50%;
  background: rgba(11,122,61,.3); border: 3px solid rgba(11,122,61,.6);
  display: flex; align-items: center; justify-content: center;
  font-size: 36px; margin: 0 auto 20px; animation: popIn .4s ease;
}
@keyframes popIn { 0%{transform:scale(.5);opacity:0} 70%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
.cmp-title { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 8px; }
.cmp-sub   { font-size: 13px; color: rgba(255,255,255,.6); margin-bottom: 24px; line-height: 1.7; }
.cmp-summary {
  background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.14);
  border-radius: 12px; padding: 14px; margin-bottom: 24px; text-align: left;
}
.cmp-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,.07); font-size: 13px; }
.cmp-row:last-child { border-bottom: none; }
.cmp-l { color: rgba(255,255,255,.5); }
.cmp-v { color: #fff; font-weight: 600; }
.btn-new {
  width: 100%; padding: 14px; font-size: 15px; font-weight: 700;
  background: var(--ac); color: #fff; border: none;
  border-radius: var(--rads); cursor: pointer; font-family: inherit; letter-spacing: .5px;
}
.btn-portal {
  width: 100%; padding: 12px; font-size: 13px; font-weight: 600;
  background: rgba(255,255,255,.1); color: rgba(255,255,255,.8);
  border: 1px solid rgba(255,255,255,.2); border-radius: var(--rads);
  cursor: pointer; font-family: inherit; margin-top: 10px;
}

/* ===== LOADING / TOAST / CONFIRM ===== */
.loading-overlay {
  position: fixed; inset: 0; background: rgba(255,255,255,.9);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 800; gap: 12px;
}
.loading-overlay.hid { display: none; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--bd); border-top-color: var(--pr); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.lmsg { font-size: 13px; color: var(--tx2); }

.toast {
  position: fixed; bottom: calc(24px + var(--sab)); left: 50%;
  transform: translateX(-50%) translateY(120px);
  background: #1a2332; color: #fff;
  padding: 11px 22px; border-radius: 30px; font-size: 13px; font-weight: 500;
  box-shadow: 0 8px 24px rgba(0,0,0,.3); z-index: 999; transition: transform .3s; white-space: nowrap;
}
.toast.show    { transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--g); }
.toast.error   { background: var(--r); }
.toast.warn    { background: var(--pause); }

.confirm-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.55);
  display: flex; align-items: center; justify-content: center; z-index: 600; padding: 20px;
}
.confirm-overlay.hid { display: none; }
.confirm-box {
  background: #fff; border-radius: 14px; padding: 1.4rem;
  width: 100%; max-width: 320px; box-shadow: 0 20px 60px rgba(0,0,0,.35);
}
.confirm-title { font-size: 14px; font-weight: 700; color: var(--tx); margin-bottom: 8px; }
.confirm-msg   { font-size: 13px; color: var(--tx2); line-height: 1.7; margin-bottom: 1.2rem; white-space: pre-wrap; }
.confirm-btns  { display: flex; gap: 10px; justify-content: flex-end; }
.btn-cf-cancel {
  padding: 9px 16px; font-size: 13px; font-weight: 600;
  background: var(--sf2); border: 1px solid var(--bd2); color: var(--tx2);
  border-radius: var(--rads); cursor: pointer; font-family: inherit;
}
.btn-cf-ok {
  padding: 9px 20px; font-size: 13px; font-weight: 600;
  background: var(--pr); color: #fff; border: none;
  border-radius: var(--rads); cursor: pointer; font-family: inherit;
}
.btn-cf-ok.danger { background: var(--r); }

/* bottom pad */
.bottom-pad { height: calc(20px + var(--sab)); flex-shrink: 0; }
</style>
</head>
<body>

<!-- ===== LOGIN（SSOなしの場合のフォールバック） ===== -->
<div id="s-login" class="screen">
  <div class="lbox">
    <div class="llogo">
      <div class="lring">🏭</div>
      <div class="lco">関ケ原プラ工業(株)</div>
      <div class="lsub">作業報告書システム</div>
    </div>
    <div class="lcard">
      <div class="lcard-title">🔐 ログイン</div>
      <div id="login-err" class="lerr" style="display:none"></div>
      <div class="fg">
        <label class="fl">社員ID / ログインID</label>
        <input class="fi" type="text" id="inp-id" placeholder="例: yasuda001"
          autocomplete="username" autocorrect="off" autocapitalize="none">
      </div>
      <div class="fg">
        <label class="fl">パスワード</label>
        <input class="fi" type="password" id="inp-pw" placeholder="パスワードを入力"
          autocomplete="current-password">
      </div>
      <button class="btnl" id="btn-login">ログイン</button>
    </div>
    <div class="login-back" onclick="goPortal()">← 業務管理ポータルに戻る</div>
  </div>
</div>

<!-- ===== MAIN ===== -->
<div id="s-main" class="screen">
  <div class="topbar">
    <div class="tbl">
      <div class="tbic">📋</div>
      <div>
        <div class="tbco">作業報告書</div>
        <div class="tbmd">関ケ原プラ工業(株)</div>
      </div>
    </div>
    <div class="tbr">
      <div class="user-chip" id="user-chip">---</div>
      <button class="btn-logout" onclick="doLogout()">退出</button>
    </div>
  </div>

  <div class="content">

    <!-- タイマー & ステータス -->
    <div class="status-bar working" id="status-bar">
      <div>
        <div class="status-label working" id="status-label">作業中</div>
        <div class="status-time" id="status-start">開始: --:--</div>
      </div>
      <div class="status-timer" id="timer-disp">00:00:00</div>
    </div>

    <!-- 一時停止 / 再開 -->
    <div class="work-controls">
      <button class="btn-pause"  id="btn-pause"  onclick="doPause()">⏸ 一時停止</button>
      <button class="btn-resume" id="btn-resume" onclick="doResume()" disabled>▶ 再開</button>
      <button class="btn-end"    id="btn-end"    onclick="doEnd()">🏁 作業終了して保存</button>
    </div>

    <!-- 基本情報 -->
    <div class="section-card">
      <div class="sc-title">👤 基本情報</div>
      <div class="frow">
        <label class="fl2">担当者 <span class="req">必須</span></label>
        <input class="fi2" type="text" id="f-tanto" readonly placeholder="自動設定">
      </div>
      <div class="frow">
        <label class="fl2">作成日時</label>
        <input class="fi2" type="text" id="f-date" readonly>
      </div>
      <div class="frow">
        <label class="fl2">作業項目 <span class="req">必須</span></label>
        <select class="fi2" id="f-sakugyo" onchange="this.classList.remove('err')">
          <option value="">選択してください</option>
          <option value="加工">加工</option>
          <option value="検査">検査</option>
          <option value="梱包">梱包</option>
          <option value="その他">その他</option>
        </select>
      </div>
    </div>

    <!-- 製品情報 -->
    <div class="section-card">

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// GAS URL — 各GASのURLを取得
// ポータルGAS   : URLパラメータ gas_url     or localStorage（ログイン・addLog用）
// 作業報告書GAS : URLパラメータ report_url  or localStorage（saveReport用）
// 製品マスタGAS : URLパラメータ product_url or localStorage（getProducts・searchProduct用）
// ============================================================

// ▼▼▼ デプロイ後に各GASのURLをここに入力してください ▼▼▼
const REPORT_GAS_URL_HARDCODED  = 'https://script.google.com/macros/s/AKfycbxDcreg8TY_k0py6cp7WURxOiXGR7WwcMYD0t3Gc5ACiiKe28ahKEBdRhpNwzomNG6aHQ/exec';
const PRODUCT_GAS_URL_HARDCODED = 'https://script.google.com/macros/s/AKfycbww1lPYGVf7FLmIbjwxODbFMKSn8Q6yxFL9OpPnYmh9AnkAWVf9BgrRgk0Wc8GvK2XN/exec';

function getGasUrl() {
  const params = new URLSearchParams(window.location.search);
  const fromUrl = params.get('gas_url');
  if (fromUrl) { localStorage.setItem('sakugyo_gas_url', fromUrl); return fromUrl; }
  return localStorage.getItem('sakugyo_gas_url') || '';
}

function getReportGasUrl() {
  const params = new URLSearchParams(window.location.search);
  const fromUrl = params.get('report_url');
  if (fromUrl) { localStorage.setItem('sakugyo_report_gas_url', fromUrl); return fromUrl; }
  return localStorage.getItem('sakugyo_report_gas_url') || REPORT_GAS_URL_HARDCODED;
}

function getProductGasUrl() {
  const params = new URLSearchParams(window.location.search);
  const fromUrl = params.get('product_url');
  if (fromUrl) { localStorage.setItem('sakugyo_product_gas_url', fromUrl); return fromUrl; }
  return localStorage.getItem('sakugyo_product_gas_url') || PRODUCT_GAS_URL_HARDCODED;
}

const GAS_URL         = getGasUrl();         // ポータルGAS（login・addLog）
const REPORT_GAS_URL  = getReportGasUrl();   // 作業報告書GAS（saveReport）
const PRODUCT_GAS_URL = getProductGasUrl();  // 製品マスタGAS（getProducts・searchProduct）

// ポータルのURL（「ポータルに戻る」ボタン用）
const PORTAL_URL = (function() {
  const params = new URLSearchParams(window.location.search);
  return params.get('portal_url') || localStorage.getItem('sakugyo_portal_url') || '';
})();

// ============================================================
// 状態管理
// ============================================================
let currentUser = null;
let workState   = { status:'working', startTime:null, pauseTime:null, pausedTotal:0, pauseLog:[] };
let timerID     = null;
let count       = 0;
let defects     = [];
let scanMode    = 'qr';
let camStream   = null;
let scanRAF     = null;
let confirmCb   = null;
let products    = []; // 製品マスタキャッシュ
let jsQRReady   = false;

// ============================================================
// 起動時 — SSOトークンの解析
// ============================================================
window.addEventListener('load', function() {
  // jsQR を非同期ロード
  loadJsQR();

  // URLパラメータから sso トークンを取得
  const params = new URLSearchParams(location.search);
  const ssoToken = params.get('sso');

  if (ssoToken) {
    try {
      // ポータルの生成ロジックと逆順: reverse → atob → JSON.parse
      const reversed = ssoToken.split('').reverse().join('');
      const json     = decodeURIComponent(escape(atob(reversed)));
      const payload  = JSON.parse(json);

      // タイムスタンプが30分以内か確認
      if (Date.now() - payload.ts < 30 * 60 * 1000) {
        currentUser = { id: payload.id, name: payload.name, role: payload.role };
        enterMain();
        return;
      }
    } catch(e) {
      console.warn('SSOトークン解析失敗:', e);
    }
  }

  // sessionStorage にセッションが残っているか確認
  try {
    const saved = sessionStorage.getItem('kpk_report_user');
    if (saved) {
      currentUser = JSON.parse(saved);
      enterMain();
      return;
    }
  } catch(e) {}

  // どちらもなければログイン画面
  document.getElementById('s-login').classList.add('on');
});

// ============================================================
// GAS通信 — actionごとに送り先GASを振り分け
// ============================================================
function resolveGasUrl(action) {
  if (['saveReport', 'getReports'].includes(action)) return REPORT_GAS_URL;
  if (['getProducts', 'searchProduct'].includes(action)) return PRODUCT_GAS_URL;
  return GAS_URL; // login・addLog等はポータルGAS
}

async function gasPost(action, data) {
  const url  = resolveGasUrl(action);
  const body = JSON.stringify({ action, ...data });
  const res  = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body
  });
  if (!res.ok) throw new Error('通信エラー ' + res.status);
  return res.json();
}

async function gasGet(params) {
  const url = resolveGasUrl(params.action || '');
  const qs  = new URLSearchParams(params).toString();
  const res = await fetch(url + '?' + qs, { redirect: 'follow' });
  if (!res.ok) throw new Error('通信エラー ' + res.status);
  return res.json();
}

// ============================================================
// ログイン（フォールバック用）
// ============================================================
document.getElementById('inp-id').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('inp-pw').focus();
});
document.getElementById('inp-pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('btn-login').addEventListener('click', doLogin);

async function doLogin() {
  const loginId = document.getElementById('inp-id').value.trim();
  const pw      = document.getElementById('inp-pw').value;
  const errEl   = document.getElementById('login-err');
  const btn     = document.getElementById('btn-login');
  errEl.style.display = 'none';
  if (!loginId || !pw) {
    errEl.textContent = 'IDとパスワードを入力してください';
    errEl.style.display = 'block'; return;
  }
  btn.disabled = true; btn.textContent = 'ログイン中...';
  try {
    const res = await gasPost('login', { loginId, pw });
    if (res.ok) {
      currentUser = res.user;
      sessionStorage.setItem('kpk_report_user', JSON.stringify(currentUser));
      gasPost('addLog', { userId: currentUser.id, action: '作業報告書ログイン', result: '成功' }).catch(() => {});
      enterMain();
    } else {
      errEl.textContent = res.message || 'IDまたはパスワードが違います';
      errEl.style.display = 'block';
    }
  } catch(e) {
    errEl.textContent = 'エラー: ' + e.message;
    errEl.style.display = 'block';
  }
  btn.disabled = false; btn.textContent = 'ログイン';
}

function doLogout() {
  openConfirm('ログアウトしますか？\n保存していない作業データは失われます。', '確認', () => {
    stopTimer(); stopCamera();
    sessionStorage.removeItem('kpk_report_user');
    currentUser = null;
    document.getElementById('s-main').classList.remove('on');
    document.getElementById('s-login').classList.add('on');
    document.getElementById('inp-pw').value = '';
    document.getElementById('login-err').style.display = 'none';
  });
}

function goPortal() {
  if (PORTAL_URL) { window.location.href = PORTAL_URL; }
  else if (document.referrer) { history.back(); }
  else { showToast('ポータルURLが未設定です', 'warn'); }
}

// ============================================================
// メイン画面へ
// ============================================================
function enterMain() {
  document.getElementById('s-login').classList.remove('on');
  document.getElementById('s-main').classList.add('on');
  document.getElementById('user-chip').textContent = currentUser.name;
  document.getElementById('f-tanto').value = currentUser.name;

  const now = new Date();
  document.getElementById('f-date').value = fmtDT(now);
  workState.startTime = now;
  updateStatusBar();
  startTimer();
  loadProducts();
}

// ============================================================
// 製品マスタ読み込み（GASから）
// ============================================================
async function loadProducts() {
  try {
    const res = await gasPost('getProducts', {});
    if (res.ok && res.data) products = res.data;
  } catch(e) { /* サイレント */ }
}

// ============================================================
// タイマー
// ============================================================
function startTimer() {
  stopTimer();
  timerID = setInterval(() => {
    if (workState.status !== 'paused') updateTimerDisp();
  }, 1000);
  updateTimerDisp();
}
function stopTimer() { if (timerID) { clearInterval(timerID); timerID = null; } }
function updateTimerDisp() {
  const ms = Date.now() - workState.startTime.getTime() - workState.pausedTotal;
  document.getElementById('timer-disp').textContent = msToHMS(Math.max(0, ms));
}
function msToHMS(ms) {
  const s = Math.floor(ms / 1000);
  return pad(Math.floor(s/3600)) + ':' + pad(Math.floor((s%3600)/60)) + ':' + pad(s%60);
}
function pad(n) { return String(n).padStart(2,'0'); }

// ============================================================
// 一時停止 / 再開
// ============================================================
function doPause() {
  if (workState.status !== 'working') return;
  workState.status    = 'paused';
  workState.pauseTime = new Date();
  workState.pauseLog.push({ type:'pause', time: workState.pauseTime.toISOString() });
  updateStatusBar();
  document.getElementById('btn-pause').disabled  = true;
  document.getElementById('btn-resume').disabled = false;
  showToast('一時停止しました', 'warn');
}
function doResume() {
  if (workState.status !== 'paused') return;
  const now = new Date();
  workState.pausedTotal += now - workState.pauseTime;
  workState.status = 'working';
  workState.pauseLog.push({ type:'resume', time: now.toISOString() });
  updateStatusBar();
  document.getElementById('btn-pause').disabled  = false;
  document.getElementById('btn-resume').disabled = true;
  showToast('作業を再開しました', 'success');
}
function updateStatusBar() {
  const bar   = document.getElementById('status-bar');
  const label = document.getElementById('status-label');
  const startEl = document.getElementById('status-start');
  if (workState.status === 'paused') {
    bar.className = 'status-bar paused';
    label.className = 'status-label paused'; label.textContent = '一時停止中';
  } else {
    bar.className = 'status-bar working';
    label.className = 'status-label working'; label.textContent = '作業中';
  }
  if (workState.startTime) startEl.textContent = '開始: ' + fmtT(workState.startTime);
}

// ============================================================
// カウント
// ============================================================
function countChange(d) {
  count = Math.max(0, count + d);
  document.getElementById('count-disp').textContent = count;
  document.getElementById('btn-minus').disabled = (count === 0);
  calcTotal();
}
function calcTotal() {
  const h = parseInt(document.getElementById('f-hakoiri').value) || 0;
  document.getElementById('total-disp').textContent = count * h;
}

// ============================================================
// スキャン
// ============================================================
function loadJsQR() {
  const s = document.createElement('script');
  s.src   = 'https://cdn.jsdelivr.net/npm/jsqr@1.3.1/dist/jsQR.min.js';
  s.onload = () => { jsQRReady = true; };
  document.head.appendChild(s);
}

function setScanMode(mode) {
  scanMode = mode;
  ['qr','bc','manual'].forEach(m => {
    document.getElementById('tab-' + m).classList.toggle('on', m === mode);
  });
  document.getElementById('btn-scan').style.display = mode === 'manual' ? 'none' : 'flex';
}

async function startScan() {
  if (!jsQRReady) {
    showToast('スキャナ準備中... しばらくお待ちください', 'warn');
    return;
  }
  document.getElementById('cam-label').textContent =
    scanMode === 'qr' ? '📱 QRコードをスキャン' : '🔲 バーコードをスキャン';
  document.getElementById('cam-overlay').classList.remove('hid');

  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width:{ideal:1280}, height:{ideal:720} }
    });
    const video = document.getElementById('cam-video');
    video.srcObject = camStream;
    await video.play();
    startScanLoop(video);
  } catch(e) {
    stopCamera();
    showToast('カメラへのアクセスが許可されていません', 'error');
  }
}

function startScanLoop(video) {
  const canvas = document.getElementById('cam-canvas');
  const ctx    = canvas.getContext('2d');
  function tick() {
    if (!camStream) return;
    if (video.readyState < 2) { scanRAF = requestAnimationFrame(tick); return; }
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    const img  = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(img.data, img.width, img.height);
    if (code && code.data) {
      onScanned(code.data, 'QR');
    } else {
      scanRAF = requestAnimationFrame(tick);
    }
  }
  scanRAF = requestAnimationFrame(tick);
}

function onScanned(raw, type) {
  stopCamera();
  const data = raw.split('|')[0].replace(/[\s\-]/g, '');
  document.getElementById('f-hinban').value = data;
  document.getElementById('f-hinban').classList.add('filled');
  showScanTag(data);
  searchProduct(data);
  showToast(type + 'スキャン: ' + data, 'success');
}

function stopCamera() {
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  if (scanRAF)   { cancelAnimationFrame(scanRAF); scanRAF = null; }
  document.getElementById('cam-overlay').classList.add('hid');
}

function showScanTag(val) {
  document.getElementById('scan-result-text').textContent = val;
  document.getElementById('scan-result-tag').style.display = 'block';
}

// ============================================================
// 製品検索
// ============================================================
function onHinbanInput() {
  const val = document.getElementById('f-hinban').value.trim();
  document.getElementById('scan-result-tag').style.display = 'none';
  if (val.length >= 4) searchProduct(val);
}

function searchProduct(code) {
  // まずローカルキャッシュから
  const key   = code.replace(/[^a-zA-Z0-9]/g,'').toUpperCase();
  const found = products.find(p =>
    p['品番'] && p['品番'].replace(/[^a-zA-Z0-9]/g,'').toUpperCase().startsWith(key.substring(0,12))
  );
  if (found) { applyProduct(found); return; }

  // 製品マスタGASに問い合わせ
  if (PRODUCT_GAS_URL && PRODUCT_GAS_URL !== '★製品マスタGASのURLを入力★') {
    gasPost('searchProduct', { code })
      .then(res => { if (res.ok && res.data) applyProduct(res.data); })
      .catch(() => {});
  }
}

function applyProduct(p) {
  document.getElementById('f-torihiki').value = p['基本取引先'] || p['取引先'] || '';
  document.getElementById('f-hakoiri').value  = p['箱入数'] || '';
  if (p['品番']) {
    document.getElementById('f-hinban').value = p['品番'];
    document.getElementById('f-hinban').classList.add('filled');
    showScanTag(p['品番']);
  }
  calcTotal();
  showToast('製品情報を自動入力しました ✓', 'success');
}

// ============================================================
// 不具合
// ============================================================
function addDefect() {
  defects.push({ id: Date.now(), type:'', count:'', detail:'' });
  renderDefects();
}
function removeDefect(id) {
  defects = defects.filter(d => d.id !== id);
  renderDefects();
}
function updateDefect(id, key, val) {
  const d = defects.find(x => x.id === id);
  if (d) d[key] = val;
}
function renderDefects() {
  const el = document.getElementById('defect-list');
  if (!defects.length) { el.innerHTML = '<div class="defect-empty">不具合なし</div>'; return; }
  el.innerHTML = defects.map((d, i) => `
    <div class="defect-item">
      <div class="defect-no">不具合 #${i+1}</div>
      <button class="defect-del" onclick="removeDefect(${d.id})">×</button>
      <div class="defect-grid">
        <div>
          <label style="font-size:11px;color:var(--tx2);font-weight:600">種類</label>
          <select class="defect-fi" onchange="updateDefect(${d.id},'type',this.value)">
            <option value="">選択</option>
            ${['外観不良','寸法不良','異物混入','欠品','その他'].map(v=>
              `<option value="${v}" ${d.type===v?'selected':''}>${v}</option>`).join('')}
          </select>
        </div>
        <div>
          <label style="font-size:11px;color:var(--tx2);font-weight:600">不良数</label>
          <input class="defect-fi" type="number" value="${d.count}" placeholder="0"
            inputmode="numeric" onchange="updateDefect(${d.id},'count',this.value)">
        </div>
      </div>
      <textarea class="defect-textarea" placeholder="詳細を記入..."
        onchange="updateDefect(${d.id},'detail',this.value)">${d.detail}</textarea>
    </div>`).join('');
}

// ============================================================
// 作業終了
// ============================================================
function doEnd() {
  if (!validate()) return;
  openConfirm(
    '作業を終了して報告書を保存しますか？\n\n' +
    '品番: ' + (document.getElementById('f-hinban').value||'未入力') + '\n' +
    'カウント: ' + count + ' 箱\n' +
    '合計: ' + document.getElementById('total-disp').textContent + ' 個',
    '作業終了・保存',
    async () => {
      if (workState.status === 'paused') doResume();
      workState.status = 'ended';
      ['btn-pause','btn-resume','btn-end'].forEach(id => {
        document.getElementById(id).disabled = true;
      });
      stopTimer();
      await submitReport(true);
    },
    true // danger
  );
}

function doSave() {
  if (!validate(false)) return;
  showToast('一時保存しました ✓', 'success');
}

// ============================================================
// バリデーション
// ============================================================
function validate(strict = true) {
  const sakugyo = document.getElementById('f-sakugyo').value;
  const hinban  = document.getElementById('f-hinban').value.trim();
  const hakoiri = document.getElementById('f-hakoiri').value;

  if (!sakugyo) {
    document.getElementById('f-sakugyo').classList.add('err');
    showToast('作業項目を選択してください', 'error');
    document.getElementById('f-sakugyo').focus();
    return false;
  }
  if (strict && !hinban) {
    document.getElementById('f-hinban').classList.add('err');
    showToast('品番を入力してください', 'error');
    return false;
  }
  if (strict && !hakoiri) {
    document.getElementById('f-hakoiri').classList.add('err');
    showToast('箱入数を入力してください', 'error');
    return false;
  }
  return true;
}

// ============================================================
// レポート送信
// ============================================================
async function submitReport(isFinal) {
  showLoading('Googleスプレッドシートに保存中...');

  const endTime    = new Date();
  const workMin    = Math.round((endTime - workState.startTime - workState.pausedTotal) / 60000);
  const hakoiri    = parseInt(document.getElementById('f-hakoiri').value) || 0;
  const totalCount = count * hakoiri;
  const fuguaiCount = defects.reduce((s, d) => s + (parseInt(d.count) || 0), 0);

  const report = {
    担当者:     currentUser.name,
    担当者ID:   currentUser.id,
    作成日時:   document.getElementById('f-date').value,
    終了日時:   fmtDT(endTime),
    作業項目:   document.getElementById('f-sakugyo').value,
    品番:       document.getElementById('f-hinban').value,
    基本取引先: document.getElementById('f-torihiki').value,
    箱入数:     hakoiri,
    カウント:   count,
    合計:       totalCount,
    作業時間分: workMin,
    不具合数:   fuguaiCount,
    不具合内容: document.getElementById('f-fuguai').value,
    不具合詳細: JSON.stringify(defects),
    一時停止ログ: JSON.stringify(workState.pauseLog),
    完了フラグ: isFinal ? '完了' : '作業中'
  };

  try {
    const res = await gasPost('saveReport', { report });
    if (!res.ok) throw new Error(res.message || '保存失敗');
  } catch(e) {
    hideLoading();
    showToast('保存エラー: ' + e.message, 'error');
    ['btn-pause','btn-end'].forEach(id => {
      document.getElementById(id).disabled = false;
    });
    workState.status = 'working';
    startTimer();
    return;
  }

  hideLoading();
  if (isFinal) showComplete(report);
}

// ============================================================
// 完了画面
// ============================================================
function showComplete(r) {
  document.getElementById('s-main').classList.remove('on');
  document.getElementById('s-complete').classList.add('on');
  document.getElementById('cmp-summary').innerHTML = [
    ['担当者',   r.担当者],
    ['作業項目', r.作業項目],
    ['品番',     r.品番 || '-'],
    ['カウント', r.カウント + ' 箱'],
    ['合計',     r.合計 + ' 個'],
    ['作業時間', r.作業時間分 + ' 分'],
    ['不具合数', r.不具合数 + ' 個'],
  ].map(([l, v]) => `<div class="cmp-row"><span class="cmp-l">${l}</span><span class="cmp-v">${v}</span></div>`).join('');
}

function startNew() {
  document.getElementById('s-complete').classList.remove('on');
  document.getElementById('s-main').classList.add('on');
  resetForm();
  count   = 0;
  defects = [];
  renderDefects();
  document.getElementById('count-disp').textContent = '0';
  document.getElementById('total-disp').textContent = '0';
  document.getElementById('btn-minus').disabled  = true;
  document.getElementById('btn-pause').disabled  = false;
  document.getElementById('btn-resume').disabled = true;
  document.getElementById('btn-end').disabled    = false;
  workState = { status:'working', startTime:new Date(), pauseTime:null, pausedTotal:0, pauseLog:[] };
  document.getElementById('f-date').value = fmtDT(workState.startTime);
  updateStatusBar();
  startTimer();
}

function resetForm() {
  ['f-sakugyo','f-hinban','f-torihiki','f-hakoiri','f-fuguai'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.value = ''; el.classList.remove('filled','err'); }
  });
  document.getElementById('scan-result-tag').style.display = 'none';
}

// ============================================================
// ユーティリティ
// ============================================================
function fmtDT(d) {
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate())
    + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}
function fmtT(d) { return pad(d.getHours()) + ':' + pad(d.getMinutes()); }

function showLoading(msg) {
  document.getElementById('lmsg').textContent = msg || '処理中...';
  document.getElementById('loading').classList.remove('hid');
}
function hideLoading() { document.getElementById('loading').classList.add('hid'); }

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' '+type : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function openConfirm(msg, title, cb, danger = false) {
  confirmCb = cb;
  document.getElementById('cf-title').textContent = title || '確認';
  document.getElementById('cf-msg').textContent   = msg;
  document.getElementById('cf-ok').className = 'btn-cf-ok' + (danger ? ' danger' : '');
  document.getElementById('confirm-overlay').classList.remove('hid');
}
function closeConfirm() {
  document.getElementById('confirm-overlay').classList.add('hid');
  confirmCb = null;
}
function execConfirm() { closeConfirm(); if (confirmCb) confirmCb(); }
</script>
